---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dvp-demo-argo-cluster
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/fl64/dvp-demo-argo.git
    targetRevision: master
    path: cluster
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
